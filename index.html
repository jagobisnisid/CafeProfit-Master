<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CafeProfit Master | Pro Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        // Komponen Icon Sederhana
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('hpp');
            const [ingredientDb, setIngredientDb] = useState([
                { id: 1, name: 'Biji Kopi House Blend', price: 150000, capacity: 1000, unit: 'gr' },
                { id: 2, name: 'Susu UHT', price: 18000, capacity: 1000, unit: 'ml' },
                { id: 3, name: 'Gula Aren Cair', price: 45000, capacity: 1000, unit: 'ml' },
            ]);
            const [menuItems, setMenuItems] = useState([
                { id: 1, name: 'Es Kopi Susu Gula Aren', hpp: 8500, price: 18000 },
                { id: 2, name: 'Croissant Butter', hpp: 12000, price: 25000 },
            ]);

            // States
            const [ingredients, setIngredients] = useState([{ dbId: '', usage: '' }]);
            const [hppName, setHppName] = useState('');
            const [promoType, setPromoType] = useState('discount');
            const [promoData, setPromoData] = useState({ itemId: '', discountPercent: 10, tebusPrice: 5000 });
            const [aiLoading, setAiLoading] = useState(false);
            const [aiResult, setAiResult] = useState(null);
            const [recipeInput, setRecipeInput] = useState('');

            const formatIDR = (val) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(val);

            const totalHPP = useMemo(() => {
                return ingredients.reduce((sum, row) => {
                    const base = ingredientDb.find(db => db.id == row.dbId);
                    if (base && row.usage) return sum + ((base.price / base.capacity) * Number(row.usage));
                    return sum;
                }, 0);
            }, [ingredients, ingredientDb]);

            const simulateAI = (type) => {
                setAiLoading(true);
                setTimeout(() => {
                    if(type === 'recipe') {
                        setAiResult(`💡 ANALISIS RESEP: ${recipeInput}\n\n1. Kombinasi Bahan: Gunakan rasio 1:3 untuk tekstur creamy.\n2. Inovasi: Tambahkan sedikit sea salt untuk rasa 'premium'.\n3. Estimasi HPP: Rp 11.200 per porsi.\n4. Strategi Harga: Cocok dijual seharga Rp 28.000 - Rp 32.000.`);
                    } else {
                        setAiResult(`📈 PROMO ADVISOR\n\n1. Paket Bundling: Pasangkan ${menuItems[0]?.name || 'Produk Utama'} dengan snack ringan.\n2. Jam Ramai: Berikan diskon 15% pada pukul 14:00 - 16:00.\n3. Flash Sale: Adakan promo "Tebus Murah" setiap hari Jumat.`);
                    }
                    setAiLoading(false);
                }, 1200);
            };

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-white border-b sticky top-0 z-10 p-4">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="bg-orange-600 p-2 rounded-lg text-white"><Icon name="coffee" /></div>
                                <h1 className="text-xl font-extrabold text-slate-800">CafeProfit Master</h1>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 space-y-4">
                        {/* Tab Navigation */}
                        <div className="flex bg-white p-1 rounded-xl shadow-sm border overflow-x-auto no-scrollbar gap-1">
                            {[
                                { id: 'hpp', icon: 'calculator', label: 'HPP' },
                                { id: 'promo', icon: 'tag', label: 'Promo' },
                                { id: 'ai', icon: 'sparkles', label: 'AI Biz' },
                                { id: 'menu', icon: 'book-open', label: 'Menu' },
                                { id: 'db', icon: 'database', label: 'Bahan' },
                            ].map((tab) => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex items-center gap-2 px-4 py-2 rounded-lg text-xs font-bold transition-all flex-1 justify-center ${activeTab === tab.id ? 'bg-orange-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}>
                                    <Icon name={tab.icon} size={14} /> {tab.label}
                                </button>
                            ))}
                        </div>

                        {/* CONTENT: HPP */}
                        {activeTab === 'hpp' && (
                            <div className="bg-white rounded-2xl p-6 shadow-sm border animate-fade">
                                <h2 className="text-sm font-black text-slate-400 uppercase mb-4">Kalkulator HPP</h2>
                                <div className="mb-6 bg-slate-50 p-4 rounded-xl text-center">
                                    <p className="text-xs font-bold text-slate-500">Total HPP per Porsi</p>
                                    <p className="text-4xl font-black text-orange-600">{formatIDR(totalHPP)}</p>
                                </div>
                                <input type="text" placeholder="Nama Menu (Contoh: Latte)" className="w-full p-3 border rounded-xl mb-4 font-bold outline-none focus:ring-2 focus:ring-orange-500" value={hppName} onChange={(e) => setHppName(e.target.value)} />
                                <div className="space-y-3">
                                    {ingredients.map((row, idx) => (
                                        <div key={idx} className="flex gap-2 items-center">
                                            <select className="flex-1 p-3 bg-slate-50 border rounded-xl text-sm" value={row.dbId} onChange={(e) => {
                                                const n = [...ingredients]; n[idx].dbId = e.target.value; setIngredients(n);
                                            }}>
                                                <option value="">Pilih Bahan</option>
                                                {ingredientDb.map(i => <option key={i.id} value={i.id}>{i.name}</option>)}
                                            </select>
                                            <input type="number" placeholder="Qty" className="w-24 p-3 border rounded-xl text-center font-bold" value={row.usage} onChange={(e) => {
                                                const n = [...ingredients]; n[idx].usage = e.target.value; setIngredients(n);
                                            }} />
                                            <button onClick={() => setIngredients(ingredients.filter((_, i) => i !== idx))} className="text-slate-300 hover:text-red-500"><Icon name="trash-2" /></button>
                                        </div>
                                    ))}
                                    <button onClick={() => setIngredients([...ingredients, { dbId: '', usage: '' }])} className="w-full py-3 border-2 border-dashed rounded-xl text-slate-400 font-bold hover:bg-orange-50 hover:border-orange-200 transition-all">+ Bahan</button>
                                </div>
                            </div>
                        )}

                        {/* CONTENT: PROMO */}
                        {activeTab === 'promo' && (
                            <div className="space-y-4 animate-fade">
                                <div className="grid grid-cols-4 gap-2">
                                    {[
                                        { id: 'discount', label: 'Diskon', icon: 'percent' },
                                        { id: 'bundling', label: 'Bundel', icon: 'package' },
                                        { id: 'bogo', label: 'BOGO', icon: 'gift' },
                                        { id: 'tebus', label: 'Tebus', icon: 'shopping-cart' }
                                    ].map(p => (
                                        <button key={p.id} onClick={() => setPromoType(p.id)} className={`p-3 rounded-xl border text-center transition-all ${promoType === p.id ? 'bg-orange-600 text-white' : 'bg-white text-slate-600'}`}>
                                            <Icon name={p.icon} className="mb-1" />
                                            <p className="text-[10px] font-bold">{p.label}</p>
                                        </button>
                                    ))}
                                </div>
                                <div className="bg-white p-6 rounded-2xl border shadow-sm">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase">Produk Target</label>
                                    <select className="w-full p-3 bg-slate-50 border rounded-xl font-bold mb-4 mt-1" value={promoData.itemId} onChange={(e) => setPromoData({...promoData, itemId: e.target.value})}>
                                        <option value="">-- Pilih Menu --</option>
                                        {menuItems.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                    </select>
                                    
                                    {promoType === 'discount' && (
                                        <input type="number" placeholder="Masukkan % Diskon" className="w-full p-3 border rounded-xl font-bold" value={promoData.discountPercent} onChange={(e) => setPromoData({...promoData, discountPercent: e.target.value})} />
                                    )}
                                    {promoType === 'tebus' && (
                                        <input type="number" placeholder="Harga Tebus Murah (Rp)" className="w-full p-3 border rounded-xl font-bold" value={promoData.tebusPrice} onChange={(e) => setPromoData({...promoData, tebusPrice: e.target.value})} />
                                    )}

                                    {promoData.itemId && (
                                        <div className="mt-6 p-5 bg-slate-900 rounded-2xl text-white">
                                            {(() => {
                                                const item = menuItems.find(m => m.id == promoData.itemId);
                                                if(!item) return null;
                                                let sell = item.price;
                                                let cost = item.hpp;
                                                if(promoType === 'discount') sell = item.price * (1 - promoData.discountPercent/100);
                                                if(promoType === 'bogo') cost = item.hpp * 2;
                                                if(promoType === 'tebus') sell = parseInt(promoData.tebusPrice);
                                                
                                                const profit = sell - cost;
                                                return (
                                                    <div className="flex justify-between items-center">
                                                        <div>
                                                            <p className="text-[10px] text-slate-400 uppercase font-bold">Profit Per Promo</p>
                                                            <p className="text-2xl font-black text-orange-400">{formatIDR(profit)}</p>
                                                        </div>
                                                        <div className="text-right">
                                                            <p className="text-[10px] text-slate-400 uppercase font-bold">Margin</p>
                                                            <p className={`text-lg font-bold ${profit > 0 ? 'text-green-400' : 'text-red-400'}`}>{((profit/sell)*100).toFixed(1)}%</p>
                                                        </div>
                                                    </div>
                                                );
                                            })()}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* CONTENT: AI BUSINESS */}
                        {activeTab === 'ai' && (
                            <div className="space-y-4 animate-fade">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="bg-white p-6 rounded-2xl border shadow-sm">
                                        <h4 className="font-black text-slate-800 flex items-center gap-2"><Icon name="chef-hat" className="text-orange-600"/> Recipe Generator</h4>
                                        <p className="text-xs text-slate-500 mt-1 mb-4">Input bahan utama untuk ide menu baru.</p>
                                        <input type="text" placeholder="Bahan: Matcha, Oatmilk..." className="w-full p-3 border rounded-xl text-sm mb-3" value={recipeInput} onChange={(e) => setRecipeInput(e.target.value)} />
                                        <button onClick={() => simulateAI('recipe')} className="w-full bg-orange-600 text-white py-3 rounded-xl font-bold text-sm shadow-lg shadow-orange-100">
                                            {aiLoading ? 'Memproses...' : 'Dapatkan Resep AI'}
                                        </button>
                                    </div>
                                    <div className="bg-white p-6 rounded-2xl border shadow-sm">
                                        <h4 className="font-black text-slate-800 flex items-center gap-2"><Icon name="trending-up" className="text-blue-600"/> Promo Advisor</h4>
                                        <p className="text-xs text-slate-500 mt-1 mb-4">Analisis strategi promo paling efisien.</p>
                                        <button onClick={() => simulateAI('advisor')} className="w-full border-2 border-blue-600 text-blue-600 py-3 rounded-xl font-bold text-sm">
                                            {aiLoading ? 'Menganalisa...' : 'Cek Ide Promo'}
                                        </button>
                                    </div>
                                </div>
                                {aiResult && (
                                    <div className="bg-slate-900 text-white rounded-2xl p-6 border-l-4 border-orange-500">
                                        <div className="whitespace-pre-wrap text-sm leading-relaxed">
                                            {aiResult}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* CONTENT: MENU & DB (Simplified) */}
                        {activeTab === 'menu' && (
                            <div className="bg-white rounded-2xl shadow-sm border overflow-hidden animate-fade">
                                <div className="p-4 bg-slate-50 border-b font-bold text-slate-400
