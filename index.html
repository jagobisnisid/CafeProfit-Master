<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CafeProfit Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        // Masukkan Ikon Lucide ke React
        const { 
          Calculator, Tag, BookOpen, Sparkles, Plus, Trash2, Percent, 
          Package, Gift, ShoppingCart, ChefHat, TrendingUp, AlertCircle, 
          Loader2, Database, Settings, ClipboardList, X, CheckCircle2, 
          Edit3, Save 
        } = lucide;

        const { useState, useEffect, useMemo } = React;

        // --- KODE KAMU DIMULAI DI SINI ---
        const apiKey = ""; // Isi API Key kamu di sini jika ada
        const GEN_MODEL = "gemini-2.5-flash-preview-09-2025";

        const App = () => {
            // (Semua kode yang kamu berikan tadi saya masukkan ke sini)
            const [activeTab, setActiveTab] = useState('hpp');
            const [showBulkModal, setShowBulkModal] = useState(false);
            const [bulkInputText, setBulkInputText] = useState('');
            const [editingId, setEditingId] = useState(null);
            
            const [ingredientDb, setIngredientDb] = useState([
                { id: 1, name: 'Biji Kopi House Blend', price: 150000, capacity: 1000, unit: 'gr' },
                { id: 2, name: 'Susu UHT', price: 18000, capacity: 1000, unit: 'ml' },
                { id: 3, name: 'Gula Aren Cair', price: 45000, capacity: 1000, unit: 'ml' },
            ]);

            const [menuItems, setMenuItems] = useState([
                { id: 1, name: 'Es Kopi Susu Gula Aren', hpp: 8500, price: 18000 },
                { id: 2, name: 'Croissant Butter', hpp: 12000, price: 25000 },
            ]);

            const [ingredients, setIngredients] = useState([{ dbId: '', usage: '' }]);
            const [hppName, setHppName] = useState('');

            const [promoType, setPromoType] = useState('discount');
            const [promoData, setPromoData] = useState({
                itemId: '',
                discountPercent: 10,
                bundlingItems: [],
                bundlePrice: 0,
                tebusMurahPrice: 5000
            });

            const [aiLoading, setAiLoading] = useState(false);
            const [aiResult, setAiResult] = useState(null);
            const [recipeInput, setRecipeInput] = useState('');

            const formatIDR = (val) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(val);

            // Logika Fungsi
            const addDbItem = () => {
                const newId = Date.now();
                setIngredientDb([...ingredientDb, { id: newId, name: '', price: 0, capacity: 1000, unit: 'gr' }]);
                setEditingId(newId);
            };

            const updateDbItem = (id, field, value) => {
                setIngredientDb(ingredientDb.map(item => item.id === id ? { ...item, [field]: value } : item));
            };

            const removeDbItem = (id) => setIngredientDb(ingredientDb.filter(item => item.id !== id));

            const addIngredientRow = () => setIngredients([...ingredients, { dbId: '', usage: '' }]);
            const updateIngredientRow = (index, field, value) => {
                const newIng = [...ingredients];
                newIng[index][field] = value;
                setIngredients(newIng);
            };
            const removeIngredientRow = (index) => setIngredients(ingredients.filter((_, i) => i !== index));

            const totalHPP = useMemo(() => {
                return ingredients.reduce((sum, row) => {
                    const base = ingredientDb.find(db => db.id == row.dbId);
                    if (base && row.usage) {
                        return sum + ((base.price / base.capacity) * Number(row.usage));
                    }
                    return sum;
                }, 0);
            }, [ingredients, ingredientDb]);

            const saveToMenu = () => {
                if (!hppName) return;
                setMenuItems([...menuItems, { id: Date.now(), name: hppName, hpp: totalHPP, price: Math.ceil((totalHPP * 3) / 1000) * 1000 }]);
                setHppName('');
                setIngredients([{ dbId: '', usage: '' }]);
                setActiveTab('menu');
            };

            // Rendering UI (Bagian Return)
            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 font-sans pb-20">
                    <header className="bg-white border-b sticky top-0 z-10">
                        <div className="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="bg-orange-600 p-2 rounded-lg text-white">
                                    <Calculator size={24} />
                                </div>
                                <h1 className="text-xl font-bold tracking-tight text-slate-800">CafeProfit Master</h1>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 space-y-6">
                        {/* Tab Nav */}
                        <div className="flex bg-white p-1 rounded-xl shadow-sm border overflow-x-auto">
                            {[
                                { id: 'hpp', icon: Calculator, label: 'Kalkulator HPP' },
                                { id: 'menu', icon: BookOpen, label: 'Menu' },
                                { id: 'db', icon: Database, label: 'Database' },
                            ].map((tab) => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all flex-1 justify-center ${
                                        activeTab === tab.id ? 'bg-orange-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-50'
                                    }`}
                                >
                                    <tab.icon size={16} /> {tab.label}
                                </button>
                            ))}
                        </div>

                        {/* Tampilan HPP */}
                        {activeTab === 'hpp' && (
                            <div className="bg-white rounded-2xl p-6 shadow-sm border">
                                <h2 className="text-lg font-bold mb-4">Kalkulator HPP</h2>
                                <input 
                                    className="w-full p-4 bg-slate-50 border rounded-xl mb-4 font-bold" 
                                    placeholder="Nama Menu" 
                                    value={hppName} 
                                    onChange={(e) => setHppName(e.target.value)}
                                />
                                {ingredients.map((row, idx) => (
                                    <div key={idx} className="flex gap-2 mb-2">
                                        <select 
                                            className="flex-1 p-2 border rounded-lg"
                                            value={row.dbId}
                                            onChange={(e) => updateIngredientRow(idx, 'dbId', e.target.value)}
                                        >
                                            <option value="">Pilih Bahan</option>
                                            {ingredientDb.map(db => <option key={db.id} value={db.id}>{db.name}</option>)}
                                        </select>
                                        <input 
                                            type="number" 
                                            className="w-20 p-2 border rounded-lg" 
                                            placeholder="Qty"
                                            value={row.usage}
                                            onChange={(e) => updateIngredientRow(idx, 'usage', e.target.value)}
                                        />
                                        <button onClick={() => removeIngredientRow(idx)} className="text-red-500">
                                            <Trash2 size={20} />
                                        </button>
                                    </div>
                                ))}
                                <button onClick={addIngredientRow} className="w-full py-2 border-2 border-dashed rounded-xl text-slate-400">+ Tambah Bahan</button>
                                <div className="mt-6 p-4 bg-orange-50 rounded-xl text-center">
                                    <p className="text-sm uppercase font-bold text-orange-600">Total HPP</p>
                                    <p className="text-3xl font-black">{formatIDR(totalHPP)}</p>
                                </div>
                                <button onClick={saveToMenu} className="w-full bg-slate-900 text-white py-4 rounded-xl mt-4 font-bold">Simpan ke Menu</button>
                            </div>
                        )}

                        {/* Tab Menu */}
                        {activeTab === 'menu' && (
                            <div className="bg-white rounded-2xl shadow-sm border divide-y">
                                {menuItems.map(item => (
                                    <div key={item.id} className="p-4 flex justify-between items-center">
                                        <div>
                                            <p className="font-bold text-lg">{item.name}</p>
                                            <p className="text-sm text-slate-500">HPP: {formatIDR(item.hpp)} | Jual: {formatIDR(item.price)}</p>
                                        </div>
                                        <span className="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">Untung!</span>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* Tab Database */}
                        {activeTab === 'db' && (
                            <div className="bg-white rounded-2xl p-6 shadow-sm border">
                                <div className="flex justify-between mb-4">
                                    <h2 className="font-bold">Database Bahan</h2>
                                    <button onClick={addDbItem} className="bg-orange-600 text-white px-3 py-1 rounded-lg text-sm">+ Bahan</button>
                                </div>
                                {ingredientDb.map(item => (
                                    <div key={item.id} className="grid grid-cols-3 gap-2 mb-2">
                                        <input className="p-2 border rounded" value={item.name} onChange={(e) => updateDbItem(item.id, 'name', e.target.value)} />
                                        <input type="number" className="p-2 border rounded" value={item.price} onChange={(e) => updateDbItem(item.id, 'price', e.target.value)} />
                                        <button onClick={() => removeDbItem(item.id)} className="text-red-400">Hapus</button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        // Render aplikasi ke dalam div root
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
