<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CafeProfit Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        // Mengambil fungsi dari React
        const { useState, useMemo, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('hpp');
            const [ingredientDb, setIngredientDb] = useState([
                { id: 1, name: 'Kopi Blend', price: 150000, capacity: 1000 },
                { id: 2, name: 'Susu UHT', price: 18000, capacity: 1000 },
            ]);
            const [ingredients, setIngredients] = useState([{ dbId: '', usage: '' }]);
            const [hppName, setHppName] = useState('');
            const [menuItems, setMenuItems] = useState([]);

            const formatIDR = (val) => new Intl.NumberFormat('id-ID', { 
                style: 'currency', currency: 'IDR', maximumFractionDigits: 0 
            }).format(val);

            const totalHPP = useMemo(() => {
                return ingredients.reduce((sum, row) => {
                    const base = ingredientDb.find(db => db.id == row.dbId);
                    if (base && row.usage) {
                        return sum + ((base.price / base.capacity) * Number(row.usage));
                    }
                    return sum;
                }, 0);
            }, [ingredients, ingredientDb]);

            // Pastikan ikon muncul setelah render
            useEffect(() => {
                lucide.createIcons();
            }, [activeTab]);

            return (
                <div className="min-h-screen font-sans">
                    <header className="bg-orange-600 p-4 text-white shadow-lg text-center">
                        <h1 className="text-2xl font-bold">☕ CafeProfit Master</h1>
                    </header>

                    <nav className="flex bg-white border-b sticky top-0">
                        <button onClick={() => setActiveTab('hpp')} className={`flex-1 p-3 font-bold ${activeTab === 'hpp' ? 'text-orange-600 border-b-2 border-orange-600' : 'text-gray-400'}`}>HITUNG HPP</button>
                        <button onClick={() => setActiveTab('menu')} className={`flex-1 p-3 font-bold ${activeTab === 'menu' ? 'text-orange-600 border-b-2 border-orange-600' : 'text-gray-400'}`}>DAFTAR MENU</button>
                    </nav>

                    <main className="p-4 max-w-md mx-auto">
                        {activeTab === 'hpp' && (
                            <div className="bg-white p-6 rounded-xl shadow-md">
                                <label className="block text-xs font-bold text-gray-400 mb-1">NAMA MENU</label>
                                <input className="w-full p-3 border rounded-lg mb-4" placeholder="Es Kopi Susu..." value={hppName} onChange={(e) => setHppName(e.target.value)} />
                                
                                <div className="space-y-3">
                                    {ingredients.map((row, idx) => (
                                        <div key={idx} className="flex gap-2">
                                            <select className="flex-1 p-2 border rounded-lg text-sm" value={row.dbId} onChange={(e) => {
                                                const newIng = [...ingredients];
                                                newIng[idx].dbId = e.target.value;
                                                setIngredients(newIng);
                                            }}>
                                                <option value="">Pilih Bahan</option>
                                                {ingredientDb.map(db => <option key={db.id} value={db.id}>{db.name}</option>)}
                                            </select>
                                            <input type="number" className="w-20 p-2 border rounded-lg text-sm" placeholder="Gram/Ml" value={row.usage} onChange={(e) => {
                                                const newIng = [...ingredients];
                                                newIng[idx].usage = e.target.value;
                                                setIngredients(newIng);
                                            }} />
                                        </div>
                                    ))}
                                </div>

                                <button onClick={() => setIngredients([...ingredients, {dbId: '', usage: ''}])} className="w-full mt-4 py-2 border-2 border-dashed border-gray-200 text-gray-400 rounded-lg">+ Tambah Bahan</button>

                                <div className="mt-6 p-4 bg-orange-100 rounded-lg text-center">
                                    <p className="text-xs font-bold text-orange-800">TOTAL HPP</p>
                                    <p className="text-2xl font-black text-orange-600">{formatIDR(totalHPP)}</p>
                                </div>

                                <button 
                                    onClick={() => {
                                        setMenuItems([...menuItems, {name: hppName, hpp: totalHPP}]);
                                        setHppName('');
                                        setIngredients([{dbId: '', usage: ''}]);
                                        setActiveTab('menu');
                                    }}
                                    disabled={!hppName}
                                    className="w-full bg-orange-600 text-white font-bold py-3 rounded-lg mt-4 disabled:bg-gray-300"
                                >
                                    SIMPAN KE MENU
                                </button>
                            </div>
                        )}

                        {activeTab === 'menu' && (
                            <div className="space-y-3">
                                {menuItems.length === 0 && <p className="text-center text-gray-400 mt-10">Belum ada menu tersimpan.</p>}
                                {menuItems.map((item, i) => (
                                    <div key={i} className="bg-white p-4 rounded-lg shadow border-l-4 border-orange-500">
                                        <p className="font-bold text-gray-800">{item.name}</p>
                                        <p className="text-orange-600 font-bold">{formatIDR(item.hpp)}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
