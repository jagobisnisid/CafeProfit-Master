<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CafeProfit Master | Business Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .tab-active { border-bottom: 4px solid #ea580c; color: #ea580c; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <header class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-md mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-orange-600 p-2 rounded-xl text-white">
                    <i data-lucide="coffee"></i>
                </div>
                <h1 class="font-extrabold text-xl tracking-tight">CafeProfit<span class="text-orange-600">.</span></h1>
            </div>
            <button onclick="window.location.reload()" class="text-slate-400"><i data-lucide="refresh-cw" size="20"></i></button>
        </div>
        <div class="max-w-md mx-auto flex text-center font-bold text-sm text-slate-400">
            <div id="tab-hpp" onclick="switchTab('hpp')" class="flex-1 py-3 cursor-pointer tab-active">HITUNG HPP</div>
            <div id="tab-db" onclick="switchTab('db')" class="flex-1 py-3 cursor-pointer">DATABASE</div>
            <div id="tab-menu" onclick="switchTab('menu')" class="flex-1 py-3 cursor-pointer">MENU</div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 pb-24">
        
        <section id="sec-hpp" class="space-y-4">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <h2 class="font-extrabold text-lg mb-4 flex items-center gap-2">
                    <i data-lucide="calculator" class="text-orange-600"></i> Buat Resep Baru
                </h2>
                <input type="text" id="recipe-name" class="w-full p-4 bg-slate-50 rounded-2xl mb-4 outline-none focus:ring-2 focus:ring-orange-500 font-bold" placeholder="Nama Menu (Contoh: Latte)">
                
                <div id="ingredient-rows" class="space-y-3">
                    </div>

                <button onclick="addRow()" class="w-full mt-4 py-3 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 font-bold text-sm hover:bg-slate-50">+ Tambah Bahan</button>
            </div>

            <div class="bg-orange-600 p-6 rounded-3xl text-white shadow-lg shadow-orange-200">
                <p class="text-[10px] font-black uppercase opacity-80 tracking-widest">Estimasi HPP Per Porsi</p>
                <h3 id="total-display" class="text-4xl font-black mt-1">Rp 0</h3>
                <button onclick="saveToMenu()" class="w-full bg-white text-orange-600 mt-6 py-4 rounded-2xl font-black shadow-sm active:scale-95 transition-all">SIMPAN KE DAFTAR MENU</button>
            </div>
        </section>

        <section id="sec-db" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <h2 class="font-extrabold text-lg mb-4">Harga Bahan Baku</h2>
                <div id="db-list" class="space-y-3">
                    </div>
                <button onclick="addDbItem()" class="w-full mt-4 py-3 bg-slate-900 text-white rounded-2xl font-bold">+ Bahan Baru</button>
            </div>
        </section>

        <section id="sec-menu" class="hidden space-y-4">
            <h2 class="font-extrabold text-lg px-2">Katalog Harga Jual</h2>
            <div id="final-menu-list" class="space-y-3">
                </div>
        </section>

    </main>

    <script>
        // Database Default
        let dbBahan = [
            { id: 1, nama: 'Biji Kopi', harga: 150000, isi: 1000 },
            { id: 2, nama: 'Susu UHT', harga: 18000, isi: 1000 },
            { id: 3, nama: 'Gula Aren', harga: 45000, isi: 1000 }
        ];

        let resepAktif = [{ dbId: 1, jumlah: 18 }];
        let daftarMenu = [];

        // Inisialisasi
        function init() {
            lucide.createIcons();
            renderHpp();
            renderDb();
        }

        // Tab Switcher
        function switchTab(target) {
            ['hpp', 'db', 'menu'].forEach(t => {
                document.getElementById(`sec-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('tab-active');
            });
            document.getElementById(`sec-${target}`).classList.remove('hidden');
            document.getElementById(`tab-${target}`).classList.add('tab-active');
            if(target === 'menu') renderFinalMenu();
        }

        // Logika HPP
        function addRow() {
            resepAktif.push({ dbId: '', jumlah: '' });
            renderHpp();
        }

        function updateResep(index, field, value) {
            resepAktif[index][field] = value;
            hitungTotal();
        }

        function hitungTotal() {
            let total = 0;
            resepAktif.forEach(item => {
                let bahan = dbBahan.find(b => b.id == item.dbId);
                if(bahan && item.jumlah) {
                    total += (bahan.harga / bahan.isi) * item.jumlah;
                }
            });
            document.getElementById('total-display').innerText = `Rp ${Math.round(total).toLocaleString('id-ID')}`;
            return total;
        }

        function renderHpp() {
            const container = document.getElementById('ingredient-rows');
            container.innerHTML = '';
            resepAktif.forEach((row, idx) => {
                container.innerHTML += `
                    <div class="flex gap-2 items-center">
                        <select onchange="updateResep(${idx}, 'dbId', this.value)" class="flex-1 p-3 bg-slate-50 border border-slate-100 rounded-xl text-sm font-semibold">
                            <option value="">Pilih Bahan</option>
                            ${dbBahan.map(b => `<option value="${b.id}" ${row.dbId == b.id ? 'selected' : ''}>${b.nama}</option>`).join('')}
                        </select>
                        <input type="number" oninput="updateResep(${idx}, 'jumlah', this.value)" value="${row.jumlah}" class="w-20 p-3 bg-slate-50 border border-slate-100 rounded-xl text-sm font-bold" placeholder="Gr/Ml">
                        <button onclick="resepAktif.splice(${idx},1); renderHpp();" class="text-red-400"><i data-lucide="trash-2" size="18"></i></button>
                    </div>
                `;
            });
            lucide.createIcons();
            hitungTotal();
        }

        // Logika Database
        function renderDb() {
            const container = document.getElementById('db-list');
            container.innerHTML = '';
            dbBahan.forEach((b, idx) => {
                container.innerHTML += `
                    <div class="grid grid-cols-12 gap-2 items-center bg-slate-50 p-3 rounded-2xl">
                        <input class="col-span-5 text-xs font-bold bg-transparent" value="${b.nama}" onchange="dbBahan[${idx}].nama = this.value">
                        <input type="number" class="col-span-4 text-xs font-bold bg-transparent" value="${b.harga}" onchange="dbBahan[${idx}].harga = this.value">
                        <p class="col-span-2 text-[10px] font-bold text-slate-400">/ ${b.isi}</p>
                        <button onclick="dbBahan.splice(${idx},1); renderDb();" class="col-span-1 text-red-300"><i data-lucide="x" size="14"></i></button>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        function addDbItem() {
            dbBahan.push({ id: Date.now(), nama: 'Bahan Baru', harga: 0, isi: 1000 });
            renderDb();
        }

        // Logika Simpan Menu
        function saveToMenu() {
            const nama = document.getElementById('recipe-name').value;
            const hpp = hitungTotal();
            if(!nama || hpp <= 0) return alert('Nama menu atau bahan belum diisi!');
            
            daftarMenu.push({ nama, hpp, hargaJual: Math.ceil((hpp * 3)/1000)*1000 });
            alert('Berhasil disimpan ke tab MENU');
            switchTab('menu');
        }

        function renderFinalMenu() {
            const container = document.getElementById('final-menu-list');
            container.innerHTML = daftarMenu.length === 0 ? '<p class="text-center text-slate-400 py-10">Belum ada menu</p>' : '';
            daftarMenu.forEach(m => {
                container.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex justify-between items-center">
                        <div>
                            <h4 class="font-extrabold text-slate-800">${m.nama}</h4>
                            <p class="text-xs font-bold text-slate-400 uppercase">HPP: Rp ${m.hpp.toLocaleString('id-ID')}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-orange-600 uppercase">Saran Jual</p>
                            <p class="font-black text-lg text-slate-900 font-mono">Rp ${m.hargaJual.toLocaleString('id-ID')}</p>
                        </div>
                    </div>
                `;
            });
        }

        window.onload = init;
    </script>
</body>
</html>
