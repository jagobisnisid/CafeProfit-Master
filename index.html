<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CafeProfit Master | Stable Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .active-tab-btn { background-color: #ea580c !important; color: white !important; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white border-b sticky top-0 z-50 p-4">
        <div class="max-w-4xl mx-auto flex items-center gap-2">
            <div class="bg-orange-600 p-2 rounded-lg text-white"><i data-lucide="coffee"></i></div>
            <h1 class="text-xl font-extrabold text-slate-800">CafeProfit Master</h1>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-4">
        
        <div class="flex bg-white p-1 rounded-xl shadow-sm border overflow-x-auto gap-1">
            <button onclick="switchTab('hpp')" id="btn-hpp" class="tab-btn flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-lg text-xs font-bold text-slate-500 active-tab-btn">
                <i data-lucide="calculator" class="w-4 h-4"></i> HPP
            </button>
            <button onclick="switchTab('promo')" id="btn-promo" class="tab-btn flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-lg text-xs font-bold text-slate-500">
                <i data-lucide="tag" class="w-4 h-4"></i> PROMO
            </button>
            <button onclick="switchTab('ai')" id="btn-ai" class="tab-btn flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-lg text-xs font-bold text-slate-500">
                <i data-lucide="sparkles" class="w-4 h-4"></i> AI BIZ
            </button>
        </div>

        <div id="hpp" class="tab-content active">
            <div class="bg-white rounded-2xl p-6 shadow-sm border">
                <h2 class="text-xs font-black text-slate-400 uppercase mb-4">Kalkulator HPP Dasar</h2>
                <div class="mb-6 bg-slate-50 p-6 rounded-2xl text-center border border-orange-100">
                    <p class="text-xs font-bold text-slate-500 mb-1">Total HPP per Porsi</p>
                    <p id="display-hpp" class="text-4xl font-black text-orange-600">Rp 0</p>
                </div>
                <div class="space-y-3">
                    <input type="text" placeholder="Nama Menu..." class="w-full p-3 border rounded-xl font-bold mb-2">
                    <div id="ingredient-list" class="space-y-2">
                        <div class="flex gap-2 items-center">
                            <select class="flex-1 p-3 bg-slate-50 border rounded-xl text-sm outline-none border-slate-200">
                                <option>Biji Kopi (Rp 150/gr)</option>
                                <option>Susu UHT (Rp 18/ml)</option>
                                <option>Gula Aren (Rp 45/ml)</option>
                            </select>
                            <input type="number" placeholder="Qty" class="w-20 p-3 border rounded-xl text-center font-bold" value="10">
                            <button class="text-slate-300"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                    <button class="w-full py-3 border-2 border-dashed rounded-xl text-slate-400 font-bold mt-2">+ Tambah Bahan</button>
                </div>
            </div>
        </div>

        <div id="promo" class="tab-content">
            <div class="space-y-4">
                <div class="grid grid-cols-4 gap-2">
                    <button onclick="setPromo('diskon')" class="promo-mode p-3 bg-white border rounded-xl text-center font-bold text-[10px] border-orange-500 text-orange-600">DISKON</button>
                    <button onclick="setPromo('bundling')" class="promo-mode p-3 bg-white border rounded-xl text-center font-bold text-[10px]">BUNDLING</button>
                    <button onclick="setPromo('bogo')" class="promo-mode p-3 bg-white border rounded-xl text-center font-bold text-[10px]">BOGO</button>
                    <button onclick="setPromo('tebus')" class="promo-mode p-3 bg-white border rounded-xl text-center font-bold text-[10px]">TEBUS</button>
                </div>

                <div class="bg-white p-6 rounded-2xl border shadow-sm">
                    <h3 id="promo-title" class="font-black text-slate-800 mb-4">Kalkulator Diskon</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase">Harga Jual Normal (Rp)</label>
                            <input type="number" id="promo-price" value="20000" class="w-full p-3 bg-slate-50 border rounded-xl font-bold" oninput="calculatePromo()">
                        </div>
                        <div>
                            <label id="promo-label" class="text-[10px] font-bold text-slate-400 uppercase">Besar Diskon (%)</label>
                            <input type="number" id="promo-value" value="10" class="w-full p-3 bg-slate-50 border rounded-xl font-bold" oninput="calculatePromo()">
                        </div>
                        <div class="p-5 bg-slate-900 rounded-2xl text-white mt-6">
                            <div class="flex justify-between items-center">
                                <div>
                                    <p class="text-[10px] text-slate-400 font-bold uppercase">Harga Setelah Promo</p>
                                    <p id="promo-result" class="text-2xl font-black text-orange-400">Rp 18.000</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="ai" class="tab-content">
            <div class="space-y-4">
                <div class="bg-white p-6 rounded-2xl border shadow-sm">
                    <div class="flex items-center gap-2 mb-2">
                        <i data-lucide="chef-hat" class="text-orange-600"></i>
                        <h4 class="font-black text-slate-800">Recipe Generator</h4>
                    </div>
                    <p class="text-xs text-slate-500 mb-4">Buat resep unik dari bahan sisa/stok yang ada.</p>
                    <input type="text" id="recipe-input" placeholder="Contoh: Matcha dan Selai Kacang" class="w-full p-3 border rounded-xl text-sm mb-3 outline-none focus:ring-2 focus:ring-orange-500">
                    <button onclick="runAI('recipe')" id="btn-recipe" class="w-full bg-orange-600 text-white py-3 rounded-xl font-bold text-sm shadow-lg">Generate Resep AI</button>
                </div>

                <div class="bg-white p-6 rounded-2xl border shadow-sm">
                    <div class="flex items-center gap-2 mb-2">
                        <i data-lucide="trending-up" class="text-blue-600"></i>
                        <h4 class="font-black text-slate-800">Promo Advisor</h4>
                    </div>
                    <p class="text-xs text-slate-500 mb-4">Saran strategi marketing berdasarkan tren cafe 2024.</p>
                    <button onclick="runAI('advisor')" id="btn-advisor" class="w-full border-2 border-blue-600 text-blue-600 py-3 rounded-xl font-bold text-sm">Cek Ide Promo</button>
                </div>

                <div id="ai-response" class="hidden bg-slate-900 text-white rounded-2xl p-6 border-l-4 border-orange-500 animate-fade">
                    <p id="ai-text" class="text-sm leading-relaxed whitespace-pre-wrap"></p>
                </div>
            </div>
        </div>

    </main>

    <script>
        // Tab System
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active-tab-btn'));
            
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active-tab-btn');
            lucide.createIcons();
        }

        // Promo Logic
        let currentMode = 'diskon';
        function setPromo(mode) {
            currentMode = mode;
            document.querySelectorAll('.promo-mode').forEach(btn => btn.classList.remove('border-orange-500', 'text-orange-600'));
            event.target.classList.add('border-orange-500', 'text-orange-600');
            
            const title = document.getElementById('promo-title');
            const label = document.getElementById('promo-label');
            
            if(mode === 'diskon') {
                title.innerText = 'Kalkulator Diskon';
                label.innerText = 'Besar Diskon (%)';
            } else if(mode === 'bundling') {
                title.innerText = 'Kalkulator Bundling (2 Menu)';
                label.innerText = 'Harga Paket (Rp)';
            } else if(mode === 'bogo') {
                title.innerText = 'Kalkulator Buy 1 Get 1';
                label.innerText = 'Potongan Tambahan (Rp)';
            } else if(mode === 'tebus') {
                title.innerText = 'Kalkulator Tebus Murah';
                label.innerText = 'Harga Tebus (Rp)';
            }
            calculatePromo();
        }

        function calculatePromo() {
            const price = parseFloat(document.getElementById('promo-price').value) || 0;
            const val = parseFloat(document.getElementById('promo-value').value) || 0;
            let result = 0;

            if(currentMode === 'diskon') result = price - (price * (val/100));
            else if(currentMode === 'bundling' || currentMode === 'tebus') result = val;
            else if(currentMode === 'bogo') result = price - val;

            document.getElementById('promo-result').innerText = 'Rp ' + result.toLocaleString('id-ID');
        }

        // AI Simulation
        function runAI(type) {
            const btn = type === 'recipe' ? document.getElementById('btn-recipe') : document.getElementById('btn-advisor');
            const responseDiv = document.getElementById('ai-response');
            const responseText = document.getElementById('ai-text');
            const input = document.getElementById('recipe-input').value;

            btn.innerText = 'Menganalisa...';
            btn.disabled = true;

            setTimeout(() => {
                responseDiv.classList.remove('hidden');
                if(type === 'recipe') {
                    responseText.innerText = `💡 IDE RESEP: ${input || 'Signature Coffee'}\n\n1. Campurkan bahan dasar dengan rasio 1:2.\n2. Tambahkan topping foam untuk meningkatkan visual.\n3. Saran Harga: Rp 25.000 - Rp 32.000.\n4. Estimasi Margin: 65%.`;
                } else {
                    responseText.innerText = `📈 STRATEGI PROMO:\n\n1. Paket Sarapan: Kopi + Roti (Hemat 20%).\n2. Loyalty: Beli 5 Gratis 1 setiap hari kerja.\n3. Jam Ajaib: Diskon 15% di jam 14:00 - 16:00.`;
                }
                btn.innerText = type === 'recipe' ? 'Generate Resep AI' : 'Cek Ide Promo';
                btn.disabled = false;
            }, 1000);
        }

        // Init
        window.onload = () => {
            lucide.createIcons();
        };
    </script>
</body>
</html>
